<!DOCTYPE html>
<html>
<head>
    <title>Healify AI Chat</title>

<style>
/* ===== Reset ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== Background ===== */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #9ecffa, #ecf3fd);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 70px;
}

/* ===== HEADER ===== */
header {
    width: 100%;
    height: 60px;
    background: #2a7de1;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: fixed;
    top: 0;
    left: 0;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 25px;
}

nav ul li a {
    text-decoration: none;
    color: white;
}

/* ===== CHAT CONTAINER ===== */
#chat-container {
    width: 850px;
    height: 570px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== HEADER INSIDE CHAT ===== */
.chat-header {
    background: #2a7de1;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

/* ===== CHAT BOX ===== */
.chat-box {
    flex: 1;
    padding: 20px;
    background: #f5f9ff;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* ===== MESSAGE BUBBLES ===== */
.message {
    max-width: 70%;
    padding: 12px 16px;
    margin: 6px 0;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
}

/* AI LEFT */
.ai-message {
    background: #e6f0ff;
    color: #333;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

/* USER RIGHT */
.user-message {
    background: #2a7de1;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

/* ===== INPUT AREA ===== */
.chat-input {
    border-top: 1px solid #ddd;
    background: #fff;
}

.chat-input form {
    display: flex;
    width: 100%;
}

.chat-input input {
    flex: 1;
    padding: 14px;
    border: none;
    outline: none;
}

.chat-input button {
    background: #2a7de1;
    color: white;
    border: none;
    padding: 0 20px;
    cursor: pointer;
}

.chat-input button:hover {
    background: #1c5fb2;
}

</style>
</head>

<body>

<header>
    <div class="logo">AI health Assistant</div>
    <nav>
        <ul>
            <li><a href="/dashboard">Home</a></li>
            <li><a href="/history">Chat History</a></li>
            <li><a href="/prescription">Prescription</a></li>
            <li><a href="/careplan">Care Plan</a></li>
            <li><a href="/chat">Chat with AI</a></li>
            <li><a href="/about">About Us</a></li>
        </ul>
    </nav>
</header>

<div id="chat-container">

    <div class="chat-header">
        AI health Assistant
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai-message">
            Hello! I'm your AI health assistant. How can I help you today?
        </div>
    </div>

    <div class="chat-input">
        <form id="chatForm">
            <input type="text" id="message" placeholder="Type message..." required>
            <button type="submit">Send</button>
        </form>
    </div>

</div>

<script>

document.getElementById("chatForm").addEventListener("submit", function(e) {

    e.preventDefault();

    let messageInput = document.getElementById("message");
    let message = messageInput.value.trim();

    if (message === "") return;

    let chatBox = document.getElementById("chatBox");

    // USER MESSAGE
    chatBox.innerHTML += `
        <div class="message user-message">${message}</div>
    `;

    messageInput.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(response => response.json())
    .then(data => {

        // AI MESSAGE
        chatBox.innerHTML += `
            <div class="message ai-message">${data.reply}</div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;
    });

});

</script>

</body>
</html>
