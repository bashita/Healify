<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <style>
        /* Background */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f4c81, #4da3ff);
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url('{{ url_for("static", filename="image2.jpeg") }}');
    background-size: cover;        /* fills entire screen */
    background-position: center;   /* center the image */
    background-repeat: no-repeat;  /* no repeating */
    background-attachment: fixed;
}

/* Login Card */
.container {
    width: 500px;
    padding: 30px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* Title */
.container h2 {
    margin-bottom: 20px;
    color: #0f4c81;
}

/* Input Fields */
input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #cfd8dc;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

input:focus {
    border-color: #4da3ff;
    box-shadow: 0 0 5px rgba(77,163,255,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(135deg, #0f4c81, #4da3ff);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0px 4px 12px rgba(0,0,0,0.25);
}

/* Signup Text */
p {
    margin-top: 15px;
    font-size: 14px;
}

p a {
    color: #0f4c81;
    text-decoration: none;
    font-weight: bold;
}

p a:hover {
    text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

    </style>
</head>
<body>

<div class="container">
    <h2>Signup</h2>
    <form method="POST">
        <input type="text" name="username" id="username" placeholder="Username" required><br><br>
        <input type="password" name="password" id="password" placeholder="Password" required><br><br>

    <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
