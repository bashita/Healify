<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healify - Care Plan</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        /* Page background */
body {
    margin: 0;
    padding: 0;
    background-color: #f0f8ff;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6f2ff, #ecf0f3);
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    }
/* Container for content */
.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    background-color: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    flex:1;
}
/* Table styling */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}
th, td {
    padding: 15px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}
th {
    background-color: #4da3ff;
    color: white;
}
/* Back button styling */
.back-btn {
    display: inline-block;
    padding: 10px 20px;
    background-color: #4da3ff;
    color: white;
    text-decoration: none;
    border-radius: 4px;
}
.back-btn:hover {
    background-color: #0f4c81;
}
footer {
    text-align: center;
    padding: 15px;
    background-color: #4da3ff;
    color: white;
}
    </style>
</head>

<body>
<body>
    <h1>Care Plan</h1>
    <div class="container">
        {% if customers and customers|length > 0 %}
        <table>
            <thead>
                <tr>
                    <th>Your Care Plan</th>
                </tr>
            </thead>
            <tbody>
                {% for row in customers %}
                <tr>
                    <td>{{ row['bot_reply'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p style="text-align:center;">No records found.</p>
        {% endif %}

        <a href="/dashboard" class="back-btn">← Back to Home</a>
        
    </div>
<footer>
    <p>Healify AI Health Assistant © 2024</p>
</footer>

</body>
</html>
