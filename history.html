<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(173, 223, 243);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background-color: whitesmoke;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #1565c0;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: #1565c0;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .back-btn:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <h1>Chat History</h1>
    <div class="container">
        {% if customers and customers|length > 0 %}
        <table>
            <thead>
                <tr>
                    <th>Message</th>
                    <th>Bot Reply</th>
                    <th>Time stamp</th>
                </tr>
            </thead>
            <tbody>
                {% for row in customers %}
                <tr>
                    <td>{{ row['message'] }}</td>
                    <td>{{ row['bot_reply'] }}</td>
                    <td>{{ row['timestamp'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p style="text-align:center;">No records found.</p>
        {% endif %}

        <a href="/chatbot" class="back-btn">← Back to Home</a>
        
    </div>
</body>
</html>
