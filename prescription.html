<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Medicine Reminder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:450px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.reminder-list{
margin-top:20px;
max-height:200px;
overflow-y:auto;
}

.reminder-item{
background:#f0f4ff;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>💊 Medicine Reminder</h2>

<input type="text" id="medicine" placeholder="Enter Medicine Name">

<input type="time" id="time">

<button onclick="addReminder()">Add Reminder</button>

<div class="reminder-list" id="reminderList"></div>

</div>

<script>

function addReminder(){

const medicine=document.getElementById("medicine").value;
const time=document.getElementById("time").value;

fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({medicine,time})
})

.then(res=>res.json())
.then(data=>{
alert(data.status);
loadReminders();
});

}

function loadReminders(){

fetch("/get")

.then(res=>res.json())

.then(data=>{

const list=document.getElementById("reminderList");
list.innerHTML="";

data.forEach(reminder=>{

list.innerHTML+=`
<div class="reminder-item">
${reminder.medicine} - ${reminder.time}
</div>
`;

});

});

}

loadReminders();

</script>

</body>
</html>
